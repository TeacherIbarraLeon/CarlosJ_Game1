<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dev Cycle // Redemption</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --bg-dark: #0a0b10;
            --panel-bg: #161b22;
        }

        body {
            background-color: var(--bg-dark);
            color: #e6edf3;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 460px;
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
        }

        h1 { font-size: 1.4rem; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 4px; color: var(--neon-blue); }
        
        .stat-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; color: #8b949e; }
        .bar-outer { width: 100%; height: 8px; background: #0d1117; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        #fan-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--neon-pink), #ff7edb); transition: width 0.4s ease; }
        #timer-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

        .reputation-tag { font-size: 0.75rem; color: var(--neon-blue); text-align: right; margin-top: -10px; margin-bottom: 15px; font-family: monospace; }
        .debuff-active { color: var(--neon-pink); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .task-btn {
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 15px; width: 100%;
            margin-bottom: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;
            display: flex; justify-content: space-between; box-sizing: border-box;
        }

        .task-btn:hover { border-color: var(--neon-blue); background: #23863611; transform: scale(1.01); }
        .task-btn span { color: var(--neon-green); font-size: 0.75rem; }
        .hard-task span { color: var(--neon-yellow); }

        #box-puzzle { padding: 20px; border-radius: 8px; transition: 0.3s; border: 1px solid transparent; }
        #puzzle-hint { font-size: 1rem; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; }
        #code-display { font-family: 'Courier New', monospace; font-size: 2.4rem; color: var(--neon-green); margin: 10px 0 25px 0; letter-spacing: 4px; min-height: 2.5rem;}

        .mode-normal { color: var(--neon-green); }
        .mode-warn { color: var(--neon-pink); animation: blink 1s infinite; }
        .mode-logic { color: var(--neon-yellow); }
        .bg-reverse { background: rgba(255, 0, 255, 0.1) !important; border-color: var(--neon-pink) !important; }
        .bg-logic { background: rgba(254, 254, 51, 0.05) !important; border-color: var(--neon-yellow) !important; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        input {
            width: 100%; background: #0d1117; border: 1px solid #30363d; padding: 15px; color: white;
            font-size: 1.3rem; border-radius: 6px; text-align: center; outline: none; margin-bottom: 15px; box-sizing: border-box;
        }

        input:focus { border-color: var(--neon-blue); }
        .btn-submit { background: var(--neon-blue) !important; color: black !important; border: none !important; justify-content: center !important; }
        
        #tutorial-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; padding: 30px; box-sizing: border-box; text-align: center;
        }

        .hidden { display: none !important; }
        #log { margin-top: 20px; font-size: 0.7rem; color: #484f58; font-family: monospace; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Dev_Cycle.exe</h1>

    <div id="tutorial-overlay" class="hidden">
        <h2 id="tut-title" style="color: var(--neon-blue);">TUTORIAL</h2>
        <p id="tut-text">...</p>
        <button class="task-btn" id="btn-tut-next" style="justify-content: center; margin-top: 20px;">NEXT</button>
    </div>

    <div id="scr-start">
        <p style="color: #8b949e; margin-bottom: 30px;">High risk, high reward. Fix your reputation.</p>
        <button class="task-btn" id="btn-init" style="justify-content: center; border-color: var(--neon-green);">
            START SESSION
        </button>
    </div>

    <div id="scr-main" class="hidden">
        <div class="stat-header"><span>FAN SATISFACTION</span><span id="fan-val">100%</span></div>
        <div class="bar-outer"><div id="fan-fill"></div></div>
        <div id="reputation-label" class="reputation-tag">Drain Speed: 1.0x</div>

        <div id="box-menu">
            <button class="task-btn hard-task" id="btn-f">New Feature <span>(Reduces Drain)</span></button>
            <button class="task-btn" id="btn-u">Minor Update <span>(Stabilizes)</span></button>
            <button class="task-btn" id="btn-b">Bug Hotfix <span>(Small Boost)</span></button>
        </div>

        <div id="box-puzzle" class="hidden">
            <div id="puzzle-hint">MODE: ???</div>
            <div id="code-display">----</div>
            <div class="bar-outer"><div id="timer-fill"></div></div>
            <input type="text" id="code-in" placeholder="..." autocomplete="off">
            <button class="task-btn btn-submit" id="btn-submit">CONFIRM COMMIT</button>
        </div>
    </div>

    <div id="scr-end" class="hidden">
        <h2 style="color: var(--neon-pink);">STUDIO_OFFLINE</h2>
        <p id="final-stats" style="font-size: 0.8rem; margin-bottom: 20px;"></p>
        <button class="task-btn" onclick="location.reload()" style="justify-content: center;">REBOOT SYSTEM</button>
    </div>

    <div id="log">> System Idle</div>
</div>

<script>
    let fanLevel = 100;
    let penaltyMultiplier = 1.0;
    let failures = 0;
    let correctAnswer = "";
    let taskTime = 0, maxTime = 0, activeType = "", tutStep = 0;
    let mainLoop, taskTimer;
    let isCaseSensitive = false;

    const tutSteps = [
        { title: "REPUTATION RECOVERY", text: "Failing tasks increases your 'Drain Speed'. To lower it, complete HARD tasks (New Features)!" },
        { title: "THE HARD WAY", text: "Hard tasks provide a huge fan boost and significantly slow down the speed at which fans leave." },
        { title: "STABILIZING", text: "Mid tasks slightly reduce the drain speed. Easy tasks only give fans." }
    ];

    function setLog(msg) { document.getElementById('log').innerText = "> " + msg; }

    document.getElementById('btn-init').onclick = () => {
        document.getElementById('scr-start').classList.add('hidden');
        document.getElementById('tutorial-overlay').classList.remove('hidden');
        updateTut();
    };

    function updateTut() {
        document.getElementById('tut-title').innerText = tutSteps[tutStep].title;
        document.getElementById('tut-text').innerText = tutSteps[tutStep].text;
    }

    document.getElementById('btn-tut-next').onclick = () => {
        tutStep++;
        if (tutStep < tutSteps.length) updateTut();
        else {
            document.getElementById('tutorial-overlay').classList.add('hidden');
            startGame();
        }
    };

    function startGame() {
        document.getElementById('scr-main').classList.remove('hidden');
        mainLoop = setInterval(() => {
            let fluctuation = (Math.random() * 1.5) - 1.05; // Slightly more negative lean
            
            if (fluctuation < 0) fluctuation *= penaltyMultiplier;
            
            fanLevel += fluctuation;
            fanLevel = Math.min(100, fanLevel);

            document.getElementById('fan-fill').style.width = fanLevel + "%";
            document.getElementById('fan-val').innerText = Math.max(0, Math.floor(fanLevel)) + "%";
            
            const repLabel = document.getElementById('reputation-label');
            repLabel.innerText = "Drain Speed: " + penaltyMultiplier.toFixed(2) + "x";
            
            if (penaltyMultiplier > 1.0) repLabel.classList.add('debuff-active');
            else repLabel.classList.remove('debuff-active');
            
            if (fanLevel <= 0) gameOver();
        }, 1000);
    }

    function startTask(difficulty) {
        activeType = difficulty;
        const config = { 'f': [7, 8], 'u': [4, 10], 'b': [2, 14] }[difficulty];
        const puzzleType = Math.floor(Math.random() * 6);
        
        let displayStr = "";
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const nums = "23456789";
        
        const puzzleBox = document.getElementById('box-puzzle');
        const hint = document.getElementById('puzzle-hint');
        const display = document.getElementById('code-display');

        puzzleBox.className = "";
        hint.className = "mode-normal";
        display.style.textShadow = "none";
        isCaseSensitive = false;

        switch(puzzleType) {
            case 0: 
                hint.innerText = "TYPE SEQUENCE:";
                for(let i=0; i<config[0]; i++) displayStr += (chars+nums).charAt(Math.floor(Math.random()*(chars+nums).length));
                correctAnswer = displayStr; break;
            case 1: 
                hint.innerText = "TYPE BACKWARDS!"; hint.className = "mode-warn"; puzzleBox.className = "bg-reverse";
                display.style.textShadow = "0 0 15px var(--neon-pink)";
                for(let i=0; i<config[0]; i++) displayStr += chars.charAt(Math.floor(Math.random()*chars.length));
                correctAnswer = displayStr.split('').reverse().join(''); break;
            case 2: 
                hint.innerText = "SOLVE PATCH:";
                let n1 = Math.floor(Math.random() * 20) + 5; let n2 = Math.floor(Math.random() * 15) + 2;
                displayStr = n1 + " + " + n2; correctAnswer = (n1 + n2).toString(); break;
            case 3: 
                hint.innerText = "BIT SHIFT (+1):"; hint.className = "mode-logic"; puzzleBox.className = "bg-logic";
                let val = Math.floor(Math.random() * 88) + 10; displayStr = val.toString(); correctAnswer = (val + 1).toString(); break;
            case 4: 
                hint.innerText = "FIND THE BUG:"; hint.className = "mode-logic";
                let charA = chars.charAt(Math.floor(Math.random()*chars.length)); let charB = nums.charAt(Math.floor(Math.random()*nums.length));
                let bugIndex = Math.floor(Math.random() * config[0]);
                for(let i=0; i<config[0]; i++) displayStr += (i === bugIndex) ? charB : charA;
                correctAnswer = charB; break;
            case 5: 
                hint.innerText = "MATCH CASING!"; isCaseSensitive = true;
                for(let i=0; i<config[0]; i++) {
                    let c = chars.charAt(Math.floor(Math.random()*chars.length));
                    displayStr += Math.random() > 0.5 ? c.toUpperCase() : c.toLowerCase();
                }
                correctAnswer = displayStr; break;
        }

        maxTime = config[1] * 100;
        taskTime = maxTime;
        document.getElementById('box-menu').classList.add('hidden');
        puzzleBox.classList.remove('hidden');
        display.innerText = displayStr;
        
        const input = document.getElementById('code-in');
        input.value = "";
        setTimeout(() => input.focus(), 20);

        clearInterval(taskTimer);
        taskTimer = setInterval(() => {
            taskTime--;
            document.getElementById('timer-fill').style.width = (taskTime/maxTime * 100) + "%";
            if (taskTime <= 0) resolve(false);
        }, 10);
    }

    document.getElementById('btn-f').onclick = () => startTask('f');
    document.getElementById('btn-u').onclick = () => startTask('u');
    document.getElementById('btn-b').onclick = () => startTask('b');

    function resolve(success) {
        clearInterval(taskTimer);
        if (success) {
            setLog("Task Successful.");
            if (activeType === 'f') {
                penaltyMultiplier = Math.max(0.5, penaltyMultiplier - 0.20);
                fanLevel = Math.min(100, fanLevel + 30);
                setLog("REPUTATION RESTORED: Drain Speed decreased.");
            } else if (activeType === 'u') {
                penaltyMultiplier = Math.max(0.5, penaltyMultiplier - 0.05);
                fanLevel = Math.min(100, fanLevel + 15);
            } else {
                fanLevel = Math.min(100, fanLevel + 8);
            }
        } else {
            failures++;
            penaltyMultiplier += 0.35;
            setLog("FAILURE: Drain Speed increased.");
            fanLevel -= 15;
        }
        document.getElementById('box-menu').classList.remove('hidden');
        document.getElementById('box-puzzle').classList.add('hidden');
    }

    function doSubmit() {
        const val = document.getElementById('code-in').value.trim();
        const check = isCaseSensitive ? (val === correctAnswer) : (val.toUpperCase() === correctAnswer.toUpperCase());
        resolve(check);
    }

    document.getElementById('btn-submit').onclick = doSubmit;
    document.getElementById('code-in').onkeyup = (e) => { if (e.key === 'Enter') doSubmit(); };

    function gameOver() {
        clearInterval(mainLoop); clearInterval(taskTimer);
        document.getElementById('scr-main').classList.add('hidden');
        document.getElementById('scr-end').classList.remove('hidden');
        document.getElementById('final-stats').innerText = "Final Drain Speed: " + penaltyMultiplier.toFixed(2) + "x | Errors: " + failures;
    }
</script>
</body>
</html>
